services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy

  queue:
    build: .
    command: php artisan queue:work --queue=suppliers,default --tries=3 --sleep=3
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
